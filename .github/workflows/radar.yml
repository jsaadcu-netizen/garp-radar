name: Radar GARP
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  escanear:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas
      - run: timeout 600 python radar_24_7.py || true
      - run: |
          git config user.name "radar-bot"
          git config user.email "radar@bot.local"
          git add radar_resultados.json elite_resultados.json cache_radar || true
          git commit -m "radar update" || echo "sin cambios"
          git push

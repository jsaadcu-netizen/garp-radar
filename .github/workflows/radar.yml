name: Radar GARP
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
jobs:
  escanear:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas
      - run: python radar_cloud.py
      - run: |
          git config user.name "radar-bot"
          git config user.email "radar@bot.local"
          git add radar_resultados.json elite_resultados.json || true
          git commit -m "radar update" || echo "sin cambios"
          git push
